<!DOCTYPE html>
<html lang="en">
    <head>
        <title>BoulderBud Login</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Bootstrap 5 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"> </script>
        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/src/assets/bb_monke.png"/>
        <link rel="stylesheet" href="/src/styles.css"/>
        <!-- Reusable footer -->
        <script src="/footer.js" type="text/javascript" defer></script>
        <!-- Reusable left portion of the header-->
        <script src="/header-ls.js" type="text/javascript" defer></script>
        <!-- FontAwesome Icons -->
        <script src="https://kit.fontawesome.com/1123bfab37.js" crossorigin="anonymous"></script>
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Honk&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Contrail+One&display=swap" rel="stylesheet">
    </head>
        <body class="bg" style="display: flex; flex-direction: column;">
        <!-- Header -->
        <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 " id="header" style="position: fixed;">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <header-left-side></header-left-side>
            </div>
        </nav>
        <div class="container-fluid" id="main_content_area" style="flex-grow: 1; padding-top: 5%;">
            <div class="row">
                <div class="row align-items-center" id="background-panel1" style="height: 100vh">
                    <div class="col col-4 offset-4 pt-4 mt-3 mb-5 order-2">
                        <h2 id="lightText" style="padding-bottom: 4%; text-align: center; font-family: 'Contrail One', sans-serif;">Sign Into Account</h2>
                        <form class="form-control py-3 px-4" style="background-color: #AB4459; border: none;">
                            <div class="mb-3">
                                <label for="email" class="form-label" style="color:white;">Email address</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                            </div>
                            <div class="mb-3" style="position:relative;">
                                <label for="password" class="form-label" style="color:white;">Password</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                                <i id="icon" class="fa-solid fa-eye" style="position: absolute; right: 10px; top: 70%; transform: translateY(-42%); font-size: 19px; color: rgb(158, 158, 159); cursor: pointer;"></i>
                            </div>
                            <!-- TODO: Implement password recovery functionality -->
                            <!-- <div class="align-items-center col-6">
                                <a href="" style="color: rgb(111, 193, 213);">Forgot your password?</a>
                            </div> -->
                            <div class="d-grid gap-1 col-4 mx-auto pt-3">
                                <button type="submit" class="btn btn-primary">Sign In</button>
                            </div>
                        </form>
                        <div class="row">
                            <div class="col-10 offset-1 mt-3">
                                <p id="feedback" style="width: auto; margin: 0; text-align: center; color: white;"></p>
                            </div>
                        </div>
                        <br/>
                        <h2 id="lightText" style="padding: 10px; text-align: center; font-family: 'Contrail One', sans-serif;">- OR -</h2>
                        <!-- Google Sign-Up Button -->
                        <div style="text-align: center;">
                            <input id="googleSignupB" type="image" src="/src/assets/google_signin.png" style="width: 200px; height:auto; padding-top: 10px;">
                        </div>
                        <a id="donthave-have_link" href="signup.html" style="text-align: center; display: block; margin-top: 35px; color: rgb(111, 193, 213);">Don't have an account? Sign up</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <footer-component></footer-component>
        <!-- Script checking for authenticated user -->
        <script type="module">
                import { auth, db } from '/src/firebase.js';
                import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
                const i = 0;
                auth.onAuthStateChanged(user => {
                    if (user && i===0) {
                        // User is signed in
                        window.location.href = "/profile.html";
                    } 
                    i++;
                });
        </script>
            <script type="module">
                            import { auth } from '/src/firebase.js';
                            import {signInWithEmailAndPassword} from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
                            
                            document.querySelector("form").addEventListener("submit", async (e) =>{
                                e.preventDefault();
                                const formData = new FormData(e.target);
                                const email = formData.get("email");
                                const password = formData.get("password");
                                //Use Firebase Authentication with Email and Password to sign in existing user
                                try {
                                    const userCred = await signInWithEmailAndPassword(auth, email, password);

                                    document.getElementById("feedback").textContent = "Welcome back!";
                                    document.getElementById("feedback").style.backgroundColor = "lightgreen";
                                    setTimeout(() => {
                                        window.location.href = "/profile.html";
                                    }, 1500);
                                    
                                } catch (err) {
                                    document.getElementById("feedback").textContent = "Email or password incorrect. Please try again.";
                                    document.getElementById("feedback").style.backgroundColor = "coral";
                                }
                                //clean up form
                                document.querySelector("form").reset();
                            });
                        </script>
                        <script>
                            const passwordInput = document.getElementById("password");
                            const revealPasswordIcon = document.getElementById("icon");

                            revealPasswordIcon.addEventListener("click", () => {
                                const newType = passwordInput.getAttribute("type") === "password" ? "text" : "password";
                                passwordInput.setAttribute("type", newType);
                                //Swap icon:
                                if(newType === "text"){
                                    document.getElementById("icon").classList.remove("fa-eye");
                                    document.getElementById("icon").classList.add("fa-eye-slash");
                                } else {
                                    document.getElementById("icon").classList.remove("fa-eye-slash");
                                    document.getElementById("icon").classList.add("fa-eye");
                                }
                            });
                        </script>

        <script type="module">
            import { auth } from '/src/firebase.js';
            import { getRedirectResult, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

            const provider = new GoogleAuthProvider();
            console.log(provider);
            const googleSignupButton = document.getElementById("googleSignupB");

            googleSignupButton.addEventListener("click", (e) => {
                e.preventDefault();
                signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Google user:", result.user);
                    setTimeout(() => {
                        window.location.href = "/profile.html";
                    }, 1000);
                })
                .catch((error) => {
                    console.error(error);
                });
            });
        </script>
    </body>
</html>
