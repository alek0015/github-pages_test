    <!-- Script checking for authenticated user -->
        <script type="module">
            import { auth, db } from '/src/firebase.js';
            import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
            import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

            onAuthStateChanged( auth, async (user) => {
                if (user){ //i.e. user is logged in
                    console.log("Current user:", user);
                    if(user.providerData[0].providerId === 'google.com'){
                        document.querySelectorAll('.pw_provider').forEach( el => el.style.display = 'none');
                        document.getElementById("changeEmailB").innerText = "";
                    } else {
                        document.querySelectorAll('.pw_provider').forEach( el => el.style.display = 'block');
                        document.getElementById("changeEmailB").innerText = "Change email";
                    }
                    document.getElementById("user-email").innerText = user.email;
                    document.getElementById("email-display").innerText = user.email;
                    if(user.photoURL){ //if user has a profile picture, display it
                        document.getElementById("user-image").src = user.photoURL;
                    }
                    //Get number of attempts remaining for the user:
                    const userRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(userRef);
                    console.log(docSnap);
                    if (docSnap.exists()){
                        const data = docSnap.data();
                        console.log(data);
                        document.getElementById("numUploadsLeft").innerText = data.uploads_left_today;
                        document.getElementById("uploads-limit-progress").value = data.uploads_left_today;
                    }
                } else {
                    window.location.href = "/index.html";
                }
            });
        </script>
        <script type="module">
            import {auth} from '/src/firebase.js';
            import {verifyBeforeUpdateEmail, reauthenticateWithCredential, EmailAuthProvider} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

            const changeEmailForm = document.getElementById('changeEmailForm');
            const changeEmailFormSubmitButton = document.getElementById('submitEmailChangeB');
            const authenticationModal = document.getElementById("reauthModal");
            const authForm = document.getElementById("reauthForm");

            changeEmailFormSubmitButton.addEventListener('click', async (e) => {
                e.preventDefault();
                const formData = new FormData(changeEmailForm);
                const updatedEmail = formData.get("email");
                const user = auth.currentUser;

                try {
                    //Try to update email
                    await verifyBeforeUpdateEmail(user, updatedEmail);
                    document.getElementById("formFeedback").textContent = "Check your new email for a confirmation link.";
                    document.getElementById("formFeedback").style.backgroundColor = "lightgreen";
                    changeEmailForm.reset(); 
                    setTimeout(() => {
                        //Hide form
                        changeEmailForm.style.display = "none";
                    }, 1000);
                } catch (err){
                    console.error("Email update error:", err);
                    //Session too old, reauthenticate:
                    if (err.code == 'auth/requires-recent-login') {
                        try{
                            //Re-authenticate user in case session is considered old:
                            const renewedCredential = await promptForCredentials();
                            await reauthenticateWithCredential(user, renewedCredential);
                            console.log("Reauthentication successful")
                
                            //Retry email update
                            await verifyBeforeUpdateEmail(user, updatedEmail);
                            document.getElementById("formFeedback").textContent = "Check your new email for a confirmation link.";
                            document.getElementById("formFeedback").style.backgroundColor = "lightgreen";
                            changeEmailForm.reset();
                            setTimeout(() => {
                                //Hide form
                                changeEmailForm.style.display = "none";
                            }, 1000);
                        } catch (reauthErr){
                            console.error("Reauthentication failed:", reauthErr);
                            document.getElementById("formFeedback").textContent = "Reauthentication failed. Try logging in again.";
                            document.getElementById("formFeedback").style.backgroundColor = "coral";
                            return 
                        }
                    } else {
                        document.getElementById("formFeedback").textContent = "Error updating email. Please retry.";
                        document.getElementById("formFeedback").style.backgroundColor = "coral";
                    }
                }
            });

            //Prompt for credentials using modal in profile.html
            function promptForCredentials(){
                return new Promise((resolve, reject) => {
                    authenticationModal.style.display = "block";

                    //Handle modal submit
                    const  handleSubmit = async (e) => {
                        e.preventDefault();
                        const authFormData = new FormData(authForm);
                        const email = authFormData.get("email");
                        const password = authFormData.get("password");
                        try {
                            const credential = EmailAuthProvider.credential(email, password);
                            //clean up and hide form
                            authForm.reset();
                            document.getElementById("modalFeedback").textContent = "Authentication successful.";
                            document.getElementById("modalFeedback").style.backgroundColor = "lightgreen";
                            setTimeout(() => {
                                authenticationModal.style.display = "none";
                            }, 500);

                            authForm.removeEventListener('submit', handleSubmit);

                            resolve(credential);
                        } catch (err) {
                            document.getElementById("modalFeedback").textContent = "Email or password incorrect. Please try again.";
                            document.getElementById("modalFeedback").style.backgroundColor = "coral";
                            reject(err);
                        }
                    }

                    authForm.addEventListener('submit', handleSubmit);
                });
            }
        </script>
        <script type="module">
            import {auth} from '/src/firebase.js';
            import {updatePassword} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

            const changePasswordForm = document.getElementById('changePasswordForm');
            const changePasswordFormSubmitButton = document.getElementById('submitPasswordChangeB');

            changePasswordFormSubmitButton.addEventListener('click', async (e) => {
                e.preventDefault();
                const formData = new FormData(changePasswordForm);
                const newPassword = formData.get("password1");
                const newPasswordRepeat = formData.get("password2");

                if(newPassword !== newPasswordRepeat){
                    document.getElementById("formFeedback2").textContent = "Passwords do not match.";
                    document.getElementById("formFeedback2").style.backgroundColor = "coral";
                } else {
                    try {
                        updatePassword(auth.currentUser, newPassword);
                        changePasswordForm.reset(); 
                        document.getElementById("formFeedback2").textContent = "Password update successful.";
                        document.getElementById("formFeedback2").style.backgroundColor = "lightgreen";
                        setTimeout(() => {
                            //Hide form
                            changePasswordForm.style.display = "none";
                            window.location.reload();
                        }, 1000);
                    } catch (err){
                        console.error("Password update error:", err);
                        document.getElementById("formFeedback2").textContent = "Error updating password";
                        document.getElementById("formFeedback2").style.backgroundColor = "coral";
                    }
                }
            });
        </script>
        <script type="module">
            import { auth } from '/src/firebase.js';
            import { signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

            document.getElementById("logoutB").addEventListener("click", async (e) => {
                e.preventDefault();
                try {
                    await signOut(auth);
                    console.log("User signed out;");
                    setTimeout(() => {
                        window.location.href = "/index.html";
                    }, 500);
                } catch (err) {
                    console.error("Error signing out: ", err.message);
                }
            });
        </script>
        <script type="module">
            import {auth} from '/src/firebase.js';
            import {deleteUser, reauthenticateWithCredential, EmailAuthProvider} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

            const deleteAccButton = document.getElementById('deleteAccountB'); 

            deleteAccButton.addEventListener('click', async (e) => {
                e.preventDefault();
                const user = auth.currentUser;

                try {
                    //Try to update email
                    await deleteUser(user);
                    document.getElementById("feedback").textContent = "Sorry to see you go. Redirecting to starting page";
                    document.getElementById("feedback").style.backgroundColor = "lightgreen";
                    setTimeout(() => {
                        window.location.href = "/index.html";
                    }, 1500);
                } catch (err){
                    console.error("Delete error:", err);
                    //Session too old, reauthenticate:
                    if (err.code == 'auth/requires-recent-login') {
                        try{
                            //Re-authenticate user in case session is considered old:
                            const renewedCredential = await promptForCredentials();
                            await reauthenticateWithCredential(user, renewedCredential);
                            console.log("Reauthentication successful")
                
                            //Retry email update
                            await deleteUser(user);
                            document.getElementById("feedback").textContent = "Sorry to see you go. Redirecting to starting page";
                            document.getElementById("feedback").style.backgroundColor = "lightgreen";
                            setTimeout(() => {
                                window.location.href = "/index.html";
                            }, 1500);
                        } catch (reauthErr){
                            console.error("Reauthentication failed:", reauthErr);
                            document.getElementById("feedback").textContent = "Reauthentication failed. Try logging in again.";
                            document.getElementById("feedback").style.backgroundColor = "coral";
                            return 
                        }
                    } else {
                        document.getElementById("feedback").textContent = "Error deleting account. Please try again.";
                        document.getElementById("feedback").style.backgroundColor = "coral";
                    }
                }
            });

            //Prompt for credentials using modal in profile.html
            function promptForCredentials(){
                return new Promise((resolve, reject) => {
                    authenticationModal.style.display = "block";

                    //Handle modal submit
                    const  handleSubmit = async (e) => {
                        e.preventDefault();
                        const authFormData = new FormData(authForm);
                        const email = authFormData.get("email");
                        const password = authFormData.get("password");
                        try {
                            const credential = EmailAuthProvider.credential(email, password);
                            //clean up and hide form
                            authForm.reset();
                            document.getElementById("modalFeedback").textContent = "Authentication successful.";
                            document.getElementById("modalFeedback").style.backgroundColor = "lightgreen";
                            setTimeout(() => {
                                authenticationModal.style.display = "none";
                            }, 500);

                            authForm.removeEventListener('submit', handleSubmit);

                            resolve(credential);
                        } catch (err) {
                            document.getElementById("modalFeedback").textContent = "Email or password incorrect. Please try again.";
                            document.getElementById("modalFeedback").style.backgroundColor = "coral";
                            reject(err);
                        }
                    }

                    authForm.addEventListener('submit', handleSubmit);
                });
            }
        </script>
        <script>
            const changeEmailButton = document.getElementById('changeEmailB');
            changeEmailButton.addEventListener('click', (e) => {
                e.preventDefault();
                //Toggle visibility of email change form
                if(changeEmailForm.style.display === "none"){
                    changeEmailForm.style.display = "block";
                }
            });

            const changePasswordButton = document.getElementById('changePasswordB');
            changePasswordButton.addEventListener('click', (e) => {
                e.preventDefault();
                //Toggle visibility of email change form
                if(changePasswordForm.style.display === "none"){
                    changePasswordForm.style.display = "block";
                }
            })

            const passwordInput = document.getElementById("auth-password");
            const revealPasswordIcon = document.getElementById("icon");

            revealPasswordIcon.addEventListener("click", () => {
                const newType = passwordInput.getAttribute("type") === "password" ? "text" : "password";
                passwordInput.setAttribute("type", newType);
                //Swap icon:
                if(newType === "text"){
                    document.getElementById("icon").classList.remove("fa-eye");
                    document.getElementById("icon").classList.add("fa-eye-slash");
                } else {
                    document.getElementById("icon").classList.remove("fa-eye-slash");
                    document.getElementById("icon").classList.add("fa-eye");
                }
            });
        </script>
        <script>
            function openTab(e, tabName) {
                var i, tabcontent, tablinks;
                tabcontent = document.getElementsByClassName("tabcontent");
                for (i = 0; i < tabcontent.length; i++) {
                    tabcontent[i].style.display = "none";
                }
                tablinks = document.getElementsByClassName("tablinks");
                for (i = 0; i < tablinks.length; i++) {
                    tablinks[i].className = tablinks[i].className.replace(" active", "");
                }
                document.getElementById(tabName).style.display = "block";
                e.currentTarget.className += " active";
            }
            document.body.addEventListener(DOMContentLoaded, openTab(event, 'feedback-history'));

            var modal = document.getElementById("reauthModal");
            var span = document.getElementsByClassName("close")[0];
            span.onclick = function() { // Close the modal when the user clicks on <span> (x)
                modal.style.display = "none";
            }
        </script>
